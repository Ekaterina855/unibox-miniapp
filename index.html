<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBox Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .ok { color: green; font-size: 24px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="ok">✅ Приложение работает!</div>
    <div id="user" style="text-align: center; margin-top: 20px;"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id?.toString();
        
        document.getElementById('user').innerHTML = userId 
            ? `Ваш ID: ${userId}` 
            : `Пользователь не определен. Открыто не в Telegram?`;
    </script>
</body>
</html>
